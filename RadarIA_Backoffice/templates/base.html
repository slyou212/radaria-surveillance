<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}RadarIA Backoffice{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; color: #e0e0f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  a { color: #e74c3c; text-decoration: none; }
  a:hover { color: #ff6b6b; }

  .topbar {
    background: #10102a;
    border-bottom: 1px solid #1a1a3a;
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 56px;
    gap: 24px;
  }
  .topbar-logo { font-size: 18px; font-weight: 800; color: #e74c3c; letter-spacing: .05em; }
  .topbar-logo span { color: #fff; }
  .topbar-nav { display: flex; gap: 4px; flex: 1; }
  .topbar-nav a {
    color: #888; font-size: 14px; padding: 8px 14px; border-radius: 8px;
    transition: all .2s;
  }
  .topbar-nav a:hover, .topbar-nav a.active { background: #1a1a3a; color: #fff; }
  .topbar-right { margin-left: auto; }
  .topbar-right a { color: #555; font-size: 13px; }

  .content { padding: 24px; max-width: 1400px; margin: 0 auto; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-title { font-size: 22px; font-weight: 700; }
  .page-title span { color: #e74c3c; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 10px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none; transition: all .2s;
    text-decoration: none;
  }
  .btn-primary { background: #e74c3c; color: #fff; }
  .btn-primary:hover { background: #c0392b; color: #fff; }
  .btn-secondary { background: #1a1a3a; color: #aaa; border: 1px solid #333; }
  .btn-secondary:hover { background: #252545; color: #fff; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-warning { background: #e67e22; color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .card {
    background: #10102a; border: 1px solid #1a1a3a;
    border-radius: 16px; padding: 20px;
  }
  .form-card {
    background: #10102a; border: 1px solid #1a1a3a;
    border-radius: 16px; padding: 24px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { color: #aaa; font-size: 13px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea {
    background: #0a0a1a; border: 1px solid #333; border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 14px; width: 100%;
    transition: border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: #e74c3c;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-actions { margin-top: 24px; display: flex; gap: 12px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; color: #666; font-size: 12px;
       text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #1a1a3a; }
  td { padding: 12px 14px; border-bottom: 1px solid #111128; font-size: 14px; }
  tr:hover td { background: #12122a; }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: .05em;
  }
  .badge-green { background: #0a2a1a; color: #27ae60; border: 1px solid #1a5a2a; }
  .badge-red { background: #2a0a0a; color: #e74c3c; border: 1px solid #5a1a1a; }
  .badge-gray { background: #1a1a2a; color: #666; border: 1px solid #333; }
  .badge-orange { background: #2a1a0a; color: #e67e22; border: 1px solid #5a3a1a; }

  .flash-messages { margin-bottom: 16px; }
  .flash { padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; }
  .flash-success { background: #0a2a1a; color: #27ae60; border: 1px solid #1a5a2a; }
  .flash-error { background: #2a0a0a; color: #e74c3c; border: 1px solid #5a1a1a; }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #10102a; border: 1px solid #1a1a3a; border-radius: 16px; padding: 20px; }
  .stat-label { color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 800; color: #fff; }
  .stat-value.red { color: #e74c3c; }
  .stat-value.green { color: #27ae60; }

  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">Radar<span>IA</span></div>
  <nav class="topbar-nav">
    <a href="/" class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">🏠 Dashboard</a>
    <a href="/client/nouveau">➕ Nouveau client</a>
  </nav>
  <div class="topbar-right">
    <a href="/logout">Déconnexion</a>
  </div>
</div>
<div class="content">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-messages">
    {% for cat, msg in messages %}
    <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>

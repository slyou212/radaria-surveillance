<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RadarIA — Connexion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; color: #e0e0f0; font-family: 'Segoe UI', sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box {
    background: #10102a; border: 1px solid #1a1a3a; border-radius: 20px;
    padding: 40px; width: 380px;
  }
  .logo { text-align: center; font-size: 28px; font-weight: 800; color: #e74c3c;
          margin-bottom: 4px; }
  .logo span { color: #fff; }
  .subtitle { text-align: center; color: #555; font-size: 13px; margin-bottom: 32px; }
  label { display: block; color: #aaa; font-size: 13px; font-weight: 600;
          margin-bottom: 6px; margin-top: 16px; }
  input {
    width: 100%; background: #0a0a1a; border: 1px solid #333; border-radius: 10px;
    padding: 12px 16px; color: #fff; font-size: 15px; transition: border-color .2s;
  }
  input:focus { outline: none; border-color: #e74c3c; }
  .btn {
    display: block; width: 100%; margin-top: 24px; padding: 14px;
    background: #e74c3c; color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s;
  }
  .btn:hover { background: #c0392b; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
           background: #2a0a0a; color: #e74c3c; border: 1px solid #5a1a1a; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Radar<span>IA</span></div>
  <div class="subtitle">Backoffice — Accès administrateur</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}{% for cat, msg in messages %}
  <div class="flash">{{ msg }}</div>
  {% endfor %}{% endif %}
  {% endwith %}
  <form method="post">
    <label>Identifiant</label>
    <input type="text" name="username" autofocus>
    <label>Mot de passe</label>
    <input type="password" name="password">
    <button type="submit" class="btn">Se connecter</button>
  </form>
</div>
</body>
</html>
